<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050709;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a0c12;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0f18;stop-opacity:1"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8df8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8df8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Green glow -->
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for content area -->
    <clipPath id="contentClip">
      <rect width="1920" height="1080"/>
    </clipPath>

    <!-- Radial glow for background -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2040;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#050709;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="accentGlow" cx="40%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#1a2860;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#050709;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#contentClip)">

  <!-- ── BACKGROUND ── -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>
  <rect width="1920" height="1080" fill="url(#accentGlow)"/>

  <!-- ── GRID LINES (subtle) ── -->
  <g opacity="0.04" stroke="#5b8df8" stroke-width="1">
    <!-- Horizontal lines -->
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
    <!-- Vertical lines -->
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>

  <!-- ── VELOCITY SPARKLINE (decorative, background right) ── -->
  <g opacity="0.12" transform="translate(920, 160)">
    <polyline
      points="0,320 80,290 160,260 240,220 320,200 400,170 480,130 560,90 640,50 720,20"
      fill="none" stroke="#5b8df8" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="720" cy="20" r="8" fill="#5b8df8"/>
    <!-- Area fill -->
    <path
      d="M0,320 80,290 160,260 240,220 320,200 400,170 480,130 560,90 640,50 720,20 720,400 0,400 Z"
      fill="url(#accentGrad)" opacity="0.08"/>
  </g>

  <!-- ── ORBIT RINGS (decorative, top-right) ── -->
  <g transform="translate(1600, 200)" opacity="0.06">
    <ellipse cx="0" cy="0" rx="280" ry="100" fill="none" stroke="#5b8df8" stroke-width="1.5"
      transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="220" ry="78" fill="none" stroke="#a78bfa" stroke-width="1"
      transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="160" ry="56" fill="none" stroke="#5b8df8" stroke-width="1"
      transform="rotate(-20)"/>
    <!-- Satellite dot on outer ring -->
    <circle cx="200" cy="-69" r="6" fill="#5b8df8" opacity="0.4" filter="url(#glow)"/>
  </g>

  <!-- ── SCAN LINE (decorative, left side) ── -->
  <g transform="translate(120, 300)" opacity="0.08">
    <rect x="0" y="0" width="2" height="400" fill="url(#accentGrad)"/>
    <rect x="0" y="0" width="60" height="2" fill="url(#accentGrad)"/>
    <rect x="0" y="398" width="60" height="2" fill="url(#accentGrad)"/>
    <rect x="0" y="100" width="20" height="1" fill="#5b8df8"/>
    <rect x="0" y="200" width="30" height="1" fill="#5b8df8"/>
    <rect x="0" y="300" width="15" height="1" fill="#5b8df8"/>
  </g>

  <!-- ── DATA POINTS (scattered, decorative) ── -->
  <g filter="url(#softGlow)">
    <circle cx="180" cy="200" r="3" fill="#5b8df8" opacity="0.3"/>
    <circle cx="1750" cy="800" r="3" fill="#38d98a" opacity="0.3"/>
    <circle cx="220" cy="850" r="2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="1800" cy="300" r="2" fill="#5b8df8" opacity="0.25"/>
    <circle cx="1650" cy="900" r="4" fill="#f5a623" opacity="0.2"/>
    <circle cx="160" cy="650" r="3" fill="#2ec4b6" opacity="0.25"/>
  </g>

  <!-- ── SIGNAL DOTS (left column, decorative) ── -->
  <g transform="translate(80, 380)" opacity="0.25">
    <circle cx="0" cy="0" r="4" fill="#38d98a" filter="url(#greenGlow)"/>
    <circle cx="0" cy="40" r="3" fill="#5b8df8"/>
    <circle cx="0" cy="80" r="4" fill="#f5a623"/>
    <circle cx="0" cy="120" r="3" fill="#a78bfa"/>
    <circle cx="0" cy="160" r="4" fill="#2ec4b6"/>
    <circle cx="0" cy="200" r="3" fill="#e84040" filter="url(#greenGlow)"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="2,6"/>
  </g>

  <!-- ── RIGHT SIDE STATS (decorative) ── -->
  <g transform="translate(1500, 400)" opacity="0.15" font-family="'SF Mono', 'Fira Code', monospace">
    <text x="0" y="0" fill="#5b8df8" font-size="12" letter-spacing="2">VELOCITY SCORE</text>
    <text x="0" y="32" fill="#e84040" font-size="36" font-weight="700">8.7 / 10</text>
    <rect x="0" y="50" width="200" height="3" fill="#e84040" rx="1.5"/>

    <text x="0" y="90" fill="#5b8df8" font-size="12" letter-spacing="2">CONFIDENCE</text>
    <text x="0" y="122" fill="#38d98a" font-size="36" font-weight="700">82%</text>
    <rect x="0" y="140" width="200" height="3" fill="#38d98a" rx="1.5"/>

    <text x="0" y="180" fill="#5b8df8" font-size="12" letter-spacing="2">TRAJECTORY</text>
    <text x="0" y="212" fill="#f5a623" font-size="36" font-weight="700">↑ +1.65</text>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- ── MAIN LOGO CONTAINER ── -->
  <!-- ══════════════════════════════════════ -->

  <!-- Glow orb behind logo -->
  <circle cx="960" cy="480" r="300" fill="#1a2040" opacity="0.5"/>
  <circle cx="960" cy="480" r="200" fill="#1a2860" opacity="0.4"/>

  <!-- Logo icon background -->
  <rect x="860" y="240" width="200" height="200" rx="36"
    fill="url(#logoGrad)" filter="url(#softGlow)"/>

  <!-- Satellite emoji-style icon (SVG paths) -->
  <!-- Body -->
  <rect x="920" y="310" width="80" height="56" rx="8" fill="white" opacity="0.9"/>
  <!-- Solar panel left -->
  <rect x="868" y="318" width="46" height="40" rx="4" fill="white" opacity="0.7"/>
  <!-- Solar panel right -->
  <rect x="1006" y="318" width="46" height="40" rx="4" fill="white" opacity="0.7"/>
  <!-- Panel strut left -->
  <rect x="912" y="334" width="8" height="8" rx="2" fill="white" opacity="0.5"/>
  <!-- Panel strut right -->
  <rect x="1000" y="334" width="8" height="8" rx="2" fill="white" opacity="0.5"/>
  <!-- Antenna -->
  <line x1="960" y1="308" x2="960" y2="270" stroke="white" stroke-width="4" opacity="0.8"/>
  <circle cx="960" cy="265" r="8" fill="white" opacity="0.9"/>
  <!-- Signal rings from antenna -->
  <circle cx="960" cy="265" r="16" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <circle cx="960" cy="265" r="26" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <!-- Body details -->
  <circle cx="945" cy="338" r="8" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="957" y="330" width="40" height="6" rx="3" fill="white" opacity="0.5"/>
  <rect x="957" y="342" width="30" height="6" rx="3" fill="white" opacity="0.4"/>

  <!-- ── ARGUS SENTINEL TEXT ── -->
  <text x="960" y="530" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="92" font-weight="700" letter-spacing="-1"
    fill="url(#accentGrad)" filter="url(#glow)">ARGUS</text>

  <text x="960" y="590" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="40" font-weight="300" letter-spacing="24"
    fill="#e8eaf0" opacity="0.9">SENTINEL</text>

  <!-- Divider line -->
  <line x1="660" y1="612" x2="1260" y2="612" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- ── TAGLINE ── -->
  <text x="960" y="658" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="400" letter-spacing="1"
    fill="#8b8fa8">Autonomous Real-time Global Understanding System</text>

  <!-- ── SUBTITLE ── -->
  <text x="960" y="700" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="17" font-weight="400"
    fill="#555970">Temporal Velocity Intelligence · Multi-Agent Pipeline · Predictive Analytics</text>

  <!-- ── BADGES ROW ── -->
  <!-- Badge 1: Bright Data -->
  <rect x="548" y="740" width="200" height="38" rx="19"
    fill="rgba(91,141,248,0.12)" stroke="rgba(91,141,248,0.35)" stroke-width="1.5"/>
  <text x="648" y="764" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="700"
    letter-spacing="1" fill="#5b8df8">BRIGHT DATA · 6 PRODUCTS</text>

  <!-- Badge 2: Claude -->
  <rect x="766" y="740" width="190" height="38" rx="19"
    fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
  <text x="861" y="764" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="700"
    letter-spacing="1" fill="#a78bfa">CLAUDE SONNET · MCP</text>

  <!-- Badge 3: Velocity -->
  <rect x="974" y="740" width="200" height="38" rx="19"
    fill="rgba(245,166,35,0.12)" stroke="rgba(245,166,35,0.35)" stroke-width="1.5"/>
  <text x="1074" y="764" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="700"
    letter-spacing="1" fill="#f5a623">TEMPORAL VELOCITY</text>

  <!-- Badge 4: Hackathon -->
  <rect x="1182" y="740" width="192" height="38" rx="19"
    fill="rgba(56,217,138,0.12)" stroke="rgba(56,217,138,0.35)" stroke-width="1.5"/>
  <text x="1278" y="764" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="700"
    letter-spacing="1" fill="#38d98a">HACKATHON 2026</text>

  <!-- ── BOTTOM SIGNAL BAR (velocity visualization) ── -->
  <g transform="translate(560, 840)">
    <!-- NEWS bar -->
    <g>
      <text x="0" y="0" font-family="'SF Mono','Fira Code',monospace" font-size="11"
        fill="#555970" letter-spacing="2">NEWS</text>
      <rect x="0" y="8" width="170" height="6" rx="3" fill="#1a1d24"/>
      <rect x="0" y="8" width="122" height="6" rx="3" fill="#5b8df8" opacity="0.8"/>
      <text x="178" y="16" font-family="'SF Mono','Fira Code',monospace" font-size="12"
        fill="#5b8df8" font-weight="700">7.2</text>
    </g>
    <!-- FINANCE bar -->
    <g transform="translate(240, 0)">
      <text x="0" y="0" font-family="'SF Mono','Fira Code',monospace" font-size="11"
        fill="#555970" letter-spacing="2">FINANCE</text>
      <rect x="0" y="8" width="170" height="6" rx="3" fill="#1a1d24"/>
      <rect x="0" y="8" width="154" height="6" rx="3" fill="#38d98a" opacity="0.8"/>
      <text x="178" y="16" font-family="'SF Mono','Fira Code',monospace" font-size="12"
        fill="#38d98a" font-weight="700">9.1</text>
    </g>
    <!-- SITE bar -->
    <g transform="translate(480, 0)">
      <text x="0" y="0" font-family="'SF Mono','Fira Code',monospace" font-size="11"
        fill="#555970" letter-spacing="2">SITE</text>
      <rect x="0" y="8" width="170" height="6" rx="3" fill="#1a1d24"/>
      <rect x="0" y="8" width="92" height="6" rx="3" fill="#2ec4b6" opacity="0.8"/>
      <text x="178" y="16" font-family="'SF Mono','Fira Code',monospace" font-size="12"
        fill="#2ec4b6" font-weight="700">5.4</text>
    </g>
    <!-- SOCIAL bar -->
    <g transform="translate(720, 0)">
      <text x="0" y="0" font-family="'SF Mono','Fira Code',monospace" font-size="11"
        fill="#555970" letter-spacing="2">SOCIAL</text>
      <rect x="0" y="8" width="170" height="6" rx="3" fill="#1a1d24"/>
      <rect x="0" y="8" width="149" height="6" rx="3" fill="#e84040" opacity="0.8"/>
      <text x="178" y="16" font-family="'SF Mono','Fira Code',monospace" font-size="12"
        fill="#e84040" font-weight="700">8.8</text>
    </g>
  </g>

  <!-- ── COMPOSITE SCORE (bottom center) ── -->
  <text x="960" y="960" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="11"
    fill="#555970" letter-spacing="6">COMPOSITE VELOCITY</text>

  <text x="960" y="1020" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="48" font-weight="700" fill="#e84040" filter="url(#glow)">8.7 / 10</text>

  <text x="960" y="1058" text-anchor="middle"
    font-family="'SF Mono','Fira Code',monospace" font-size="12"
    fill="#555970" letter-spacing="3">ALERT TRIGGERED · 82% CONFIDENCE · 14-DAY WINDOW</text>

  <!-- ── DECORATIVE CORNER MARKS ── -->
  <g opacity="0.2" stroke="#5b8df8" stroke-width="2">
    <!-- Top-left -->
    <line x1="40" y1="40" x2="80" y2="40"/>
    <line x1="40" y1="40" x2="40" y2="80"/>
    <!-- Top-right -->
    <line x1="1880" y1="40" x2="1840" y2="40"/>
    <line x1="1880" y1="40" x2="1880" y2="80"/>
    <!-- Bottom-left -->
    <line x1="40" y1="1040" x2="80" y2="1040"/>
    <line x1="40" y1="1040" x2="40" y2="1000"/>
    <!-- Bottom-right -->
    <line x1="1880" y1="1040" x2="1840" y2="1040"/>
    <line x1="1880" y1="1040" x2="1880" y2="1000"/>
  </g>

  <!-- ── SUBTLE TOP RULE ── -->
  <rect x="0" y="0" width="1920" height="3" fill="url(#accentGrad)" opacity="0.6"/>

  </g><!-- end clip -->
</svg>
